name: Blog Agent

on:
  workflow_dispatch:
  schedule:
    - cron: "0 10 * * *"

permissions:
  contents: write

jobs:
  generate-blog-post:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run blog agent
        env:
          NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL }}
          BLOG_AGENT_API_KEY: ${{ secrets.BLOG_AGENT_API_KEY }}
          BLOG_AGENT_BASE_URL: ${{ vars.BLOG_AGENT_BASE_URL }}
          BLOG_AGENT_MODEL: ${{ vars.BLOG_AGENT_MODEL }}
          BLOG_AGENT_NEWS_FEEDS: ${{ vars.BLOG_AGENT_NEWS_FEEDS }}
          ME_GUSTA_REFERENCE_NOTES: ${{ vars.ME_GUSTA_REFERENCE_NOTES }}
        run: npm run blog:generate

      - name: Commit and push if changed
        run: |
          git config user.name "me-gusta-blog-agent"
          git config user.email "actions@users.noreply.github.com"
          git add src/data/blog-posts.generated.json
          git diff --cached --quiet || git commit -m "chore: atualizar blog automatizado"
          git push
